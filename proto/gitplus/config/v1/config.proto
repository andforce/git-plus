edition = "2023";

package gitplus.config.v1;

import "buf/validate/validate.proto";
import "google/protobuf/go_features.proto";

option features.(pb.go).api_level = API_OPEN;
option features.field_presence = EXPLICIT;

enum Platform {
  PLATFORM_UNSPECIFIED = 0;
  PLATFORM_GITHUB = 1;
}

message ValidationIssue {
  enum Severity {
    SEVERITY_UNSPECIFIED = 0;
    SEVERITY_ERROR = 1;
    SEVERITY_WARNING = 2;
    SEVERITY_INFO = 3;
  }

  Severity severity = 1;
  string code = 2;
  string message = 3;
  string path = 4;
  string source_id = 5;
  int32 line = 6;
}

message IssueSummary {
  int32 error = 1;
  int32 warning = 2;
  int32 info = 3;
}

message Source {
  string id = 1 [(buf.validate.field).string.min_len = 1];
  Platform platform = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  string username = 3 [(buf.validate.field).string.min_len = 1];
  string token = 4 [(buf.validate.field).string = {
    min_len: 1
    prefix: "$encrypted$1$"
  }];
  repeated string only_include_repos = 5 [(buf.validate.field).repeated = {
    unique: true
    items: {
      string: {
        min_len: 1
      }
    }
  }];
  repeated string exclude_repos = 6 [(buf.validate.field).repeated = {
    unique: true
    items: {
      string: {
        min_len: 1
      }
    }
  }];
  bool include_defaults = 7;
  bool include_starred = 8;
  bool include_watching = 9;
  string name = 10;
}

message ConfigSnapshot {
  int32 concurrency = 1 [(buf.validate.field).int32.gt = 0];
  repeated Source sources = 2;
  int32 max_retry_times = 3 [(buf.validate.field).int32.gte = 0];
  string cron = 4;
}

message StringListValue {
  repeated string values = 1 [(buf.validate.field).repeated = {
    unique: true
    items: {
      string: {
        min_len: 1
      }
    }
  }];
}

message CreateSourceInput {
  reserved 1;
  Platform platform = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  string username = 3 [(buf.validate.field).string.min_len = 1];
  string token_plaintext = 4 [(buf.validate.field).string.min_len = 1];
  repeated string only_include_repos = 5 [(buf.validate.field).repeated = {
    unique: true
    items: {
      string: {
        min_len: 1
      }
    }
  }];
  repeated string exclude_repos = 6 [(buf.validate.field).repeated = {
    unique: true
    items: {
      string: {
        min_len: 1
      }
    }
  }];
  bool include_defaults = 7;
  bool include_starred = 8;
  bool include_watching = 9;
  string name = 10;
}

message UpdateSourcePatch {
  reserved 1;
  Platform platform = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  string username = 3 [(buf.validate.field).string.min_len = 1];
  StringListValue only_include_repos = 4;
  StringListValue exclude_repos = 5;
  bool include_defaults = 6;
  bool include_starred = 7;
  bool include_watching = 8;
  string name = 9;
}

message CheckConfigRequest {}

message CheckConfigResponse {
  repeated ValidationIssue issues = 1;
  IssueSummary summary = 2;
}

message CheckSourceConfigRequest {
  string source_id = 1;
}

message CheckSourceConfigResponse {
  bool exists = 1;
  string source_id = 2;
  repeated ValidationIssue issues = 3;
  IssueSummary summary = 4;
}

message GetConfigRequest {}

message GetConfigResponse {
  bool exists = 1;
  ConfigSnapshot config = 2;
}

message UpdateConfigRequest {
  int32 concurrency = 1 [(buf.validate.field).int32.gt = 0];
  int32 max_retry_times = 2 [(buf.validate.field).int32.gte = 0];
}

message UpdateConfigResponse {
  ConfigSnapshot config = 1;
}

message CreateSourceRequest {
  CreateSourceInput source = 1 [(buf.validate.field).required = true];
}

message CreateSourceResponse {
  ConfigSnapshot config = 1;
}

message UpdateSourceRequest {
  string source_id = 1 [(buf.validate.field).string.min_len = 1];
  UpdateSourcePatch patch = 2 [(buf.validate.field).required = true];
}

message UpdateSourceResponse {
  ConfigSnapshot config = 1;
}

message ReplaceSourceTokenRequest {
  string source_id = 1 [(buf.validate.field).string.min_len = 1];
  string token_plaintext = 2 [(buf.validate.field).string.min_len = 1];
}

message ReplaceSourceTokenResponse {
  Source source = 1;
}

message DeleteSourceRequest {
  string source_id = 1 [(buf.validate.field).string.min_len = 1];
}

message DeleteSourceResponse {
  ConfigSnapshot config = 1;
}

message PingRequest {}

message PingResponse {}

service ConfigService {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc CheckConfig(CheckConfigRequest) returns (CheckConfigResponse);
  rpc CheckSourceConfig(CheckSourceConfigRequest) returns (CheckSourceConfigResponse);
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse);
  rpc UpdateConfig(UpdateConfigRequest) returns (UpdateConfigResponse);
  rpc CreateSource(CreateSourceRequest) returns (CreateSourceResponse);
  rpc UpdateSource(UpdateSourceRequest) returns (UpdateSourceResponse);
  rpc ReplaceSourceToken(ReplaceSourceTokenRequest) returns (ReplaceSourceTokenResponse);
  rpc DeleteSource(DeleteSourceRequest) returns (DeleteSourceResponse);
}
