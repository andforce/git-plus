edition = "2023";

package gitplus.task.v1;

import "buf/validate/validate.proto";
import "google/protobuf/go_features.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option features.(pb.go).api_level = API_OPEN;
option features.field_presence = EXPLICIT;

enum TaskState {
  TASK_STATE_UNSPECIFIED = 0;
  TASK_STATE_QUEUED = 1;
  TASK_STATE_RUNNING = 2;
  TASK_STATE_FINISHED = 3;
  TASK_STATE_FAILED = 4;
}

enum TaskEnqueueResult {
  TASK_ENQUEUE_RESULT_UNSPECIFIED = 0;
  TASK_ENQUEUE_RESULT_STARTED = 1;
  TASK_ENQUEUE_RESULT_QUEUED = 2;
  TASK_ENQUEUE_RESULT_DEDUPED = 3;
}

message TaskProgress {
  string summary = 1;
  google.protobuf.Struct meta = 2;
  google.protobuf.Timestamp updated_at = 3;
}

message Task {
  string task_id = 1;
  string job_id = 2;
  string job_type = 3;
  string name = 4;
  TaskState state = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp started_at = 7;
  TaskProgress progress = 8;
  string parent_task_id = 9;
  google.protobuf.Struct args = 10;
  google.protobuf.Timestamp finished_at = 11;
  string error_message = 12;
}

message TaskRunLog {
  int64 id = 1;
  string task_id = 2;
  string event_type = 3;
  string summary = 4;
  google.protobuf.Struct meta = 5;
  string error_message = 6;
  google.protobuf.Timestamp created_at = 7;
}

message GetTaskRuntimeRequest {}

message GetTaskRuntimeResponse {
  Task running_task = 1;
  repeated Task queued_tasks = 2;
}

message ListTaskRunsRequest {
  int32 page_size = 1 [(buf.validate.field).int32 = {
    gte: 1
    lte: 100
  }];
  string page_token = 2;
  string job_type = 3;
  string parent_task_id = 4;
}

message ListTaskRunsResponse {
  repeated Task task_runs = 1;
  string next_page_token = 2;
  int32 total_count = 3;
}

message GetTaskRunRequest {
  string task_id = 1 [(buf.validate.field).string.min_len = 1];
}

message GetTaskRunResponse {
  Task task_run = 1;
}

message ListTaskRunLogsRequest {
  string task_id = 1 [(buf.validate.field).string.min_len = 1];
}

message ListTaskRunLogsResponse {
  repeated TaskRunLog logs = 1;
}

message EnqueueFullSyncRequest {}

message EnqueueFullSyncResponse {
  TaskEnqueueResult result = 1;
  Task task = 2;
}

message EnqueueSourceSyncRequest {
  string source_id = 1 [(buf.validate.field).string.min_len = 1];
}

message EnqueueSourceSyncResponse {
  TaskEnqueueResult result = 1;
  Task task = 2;
}

message CancelQueuedTaskRequest {
  string task_id = 1 [(buf.validate.field).string.min_len = 1];
}

message CancelQueuedTaskResponse {
  Task task = 1;
}

message EnqueueTestTaskRequest {
  int32 variant = 1 [(buf.validate.field).int32 = {
    gte: 1
    lte: 5
  }];
}

message EnqueueTestTaskResponse {
  TaskEnqueueResult result = 1;
  Task task = 2;
}

service TaskService {
  rpc GetTaskRuntime(GetTaskRuntimeRequest) returns (GetTaskRuntimeResponse);
  rpc ListTaskRuns(ListTaskRunsRequest) returns (ListTaskRunsResponse);
  rpc GetTaskRun(GetTaskRunRequest) returns (GetTaskRunResponse);
  rpc ListTaskRunLogs(ListTaskRunLogsRequest) returns (ListTaskRunLogsResponse);
  rpc EnqueueFullSync(EnqueueFullSyncRequest) returns (EnqueueFullSyncResponse);
  rpc EnqueueSourceSync(EnqueueSourceSyncRequest) returns (EnqueueSourceSyncResponse);
  rpc CancelQueuedTask(CancelQueuedTaskRequest) returns (CancelQueuedTaskResponse);
  rpc EnqueueTestTask(EnqueueTestTaskRequest) returns (EnqueueTestTaskResponse);
}
