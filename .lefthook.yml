# lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    gofmt:
      glob: '**/*.go'
      exclude: '^pkg/rpc/'
      run: gofmt -s -w -l {staged_files}
      stage_fixed: true
    prettier:
      glob: '*.{js,jsx,ts,tsx,json,md,css,scss,html,yml,yaml}'
      exclude: '^(pkg/rpc/|frontend/src/rpc/)'
      run: npx prettier --write {staged_files}
      stage_fixed: true
    eslint:
      glob: '*.{js,jsx,ts,tsx}'
      exclude: '^(pkg/rpc/|frontend/src/rpc/)'
      run: npx eslint --fix {staged_files}
      stage_fixed: true
